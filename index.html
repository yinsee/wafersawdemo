<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAW Demo - AOI Pan</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Fill viewport and center the stage */
    #viewport {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Stage keeps main-ui.png natural size 1024x768; scaled up via transform */
    #stage {
      position: relative;
      width: 1024px;
      height: 768px;
      user-select: none;
      transform-origin: center center;
    }

    #stage>img.bg {
      display: block;
      width: 1024px;
      height: 768px;
      pointer-events: none;
    }

    /* Placeholder overlaid on the blue area */
    #placeholder {
      position: absolute;
      left: 14px;
      top: 106px;
      width: 513px;
      height: 480px;
      overflow: hidden;
      background: #0000ff;
      outline: 1px solid #000;
    }

    /* AOI image enlarged 1.25x, panned via transform */
    #aoi {
      position: absolute;
      left: 0;
      top: 0;
      width: 641.25px;
      /* 513 * 1.25 */
      height: auto;
      transform: translate(0px, 0px);
      will-change: transform;
      pointer-events: none;
    }

    :root {
      --hair-offset: 46px;
    }
    .center-lines {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .line-solid {
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background-color: #00ff00;
      transform: translateY(-50%);
    }

    .line-dashed-top {
      position: absolute;
      left: 0;
      top: calc(50% - var(--hair-offset));
      width: 100%;
      height: 1px;
      background-image: repeating-linear-gradient(90deg, #00ff00, #00ff00 24px, transparent 24px, transparent 40px);
    }

    .line-dashed-bottom {
      position: absolute;
      left: 0;
      top: calc(50% + var(--hair-offset));
      width: 100%;
      height: 1px;
      background-image: repeating-linear-gradient(90deg, #00ff00, #00ff00 24px, transparent 24px, transparent 40px);
    }

    .crosshair-tick-top {
      position: absolute;
      left: 50%;
      top: calc(50% - var(--hair-offset) - 7px);
      width: 1px;
      height: 15px;
      background-color: #00ff00;
      transform: translateX(-50%);
    }

    .crosshair-tick-center {
      position: absolute;
      left: 50%;
      top: calc(50% - 12px);
      width: 1px;
      height: 25px;
      background-color: #00ff00;
      transform: translateX(-50%);
    }

    .crosshair-tick-bottom {
      position: absolute;
      left: 50%;
      top: calc(50% + var(--hair-offset) - 7px);
      width: 1px;
      height: 15px;
      background-color: #00ff00;
      transform: translateX(-50%);
    }

    #ui-layer {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .ui-btn {
      position: absolute;
      cursor: pointer;
      background-image: url('main-ui.png');
      background-repeat: no-repeat;
      border: none;
      outline: none;
      border-radius: 2px;
      box-shadow: inset 1px 1px 2px rgba(255,255,255,0.7), inset -1px -1px 2px rgba(0,0,0,0.5);
      z-index: 20; /* above everything */
    }
    .ui-btn:active, .ui-btn.active {
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.6), inset -1px -1px 2px rgba(255,255,255,0.4);
      background-position-y: calc(var(--bg-y) + 1px) !important;
      background-position-x: calc(var(--bg-x) + 1px) !important;
    }

    #stage.panel-adjusted .ui-btn {
      background-image: url('adjust.jpeg');
    }

    #stage.panel-adjusted #btn-f3,
    #stage.panel-adjusted #btn-f8 {
      display: none;
    }

    #btn-f3 {
      left: 370px;
      top: 610px;
      width: 135px;
      height: 70px;
      background-position: -370px -610px;
      --bg-x: -370px;
      --bg-y: -610px;
    }
    #btn-f7 {
      left: 878px;
      top: 685px;
      width: 68px;
      height: 68px;
      background-position: -878px -685px;
      --bg-x: -878px;
      --bg-y: -685px;
    }
    #btn-f8 {
      left: 370px;
      top: 684px;
      width: 135px;
      height: 70px;
      background-position: -370px -684px;
      --bg-x: -370px;
      --bg-y: -684px;
    }

    #panel-overlay {
      position: absolute;
      left: 0;
      top: 590px;
      width: 1024px;
      height: 178px;
      background-image: url('adjust.jpeg');
      background-position: 0 -590px;
      z-index: 15;
      display: none;
      pointer-events: none;
    }
    #stage.panel-adjusted #panel-overlay {
      display: block;
    }

    /* #hint {
    position: absolute;
    left: 14px;
    top: 596px;
    font: 11px monospace;
    color: #fff;
    background: rgba(0,0,0,.6);
    padding: 2px 4px;
  } */
  </style>
</head>

<body>
  <div id="viewport">
    <div id="stage" tabindex="0">
      <img class="bg" src="main-ui.png" alt="main ui">
      <div id="placeholder">
        <img id="aoi" src="aoi.png" alt="aoi">

        <div class="center-lines">
          <div class="line-dashed-top"></div>
          <div class="crosshair-tick-top"></div>

          <div class="line-solid"></div>
          <div class="crosshair-tick-center"></div>

          <div class="line-dashed-bottom"></div>
          <div class="crosshair-tick-bottom"></div>
        </div>

        <img id="ui-layer" src="ui.png" alt="ui overlay">
      </div>
      
      <div id="panel-overlay"></div>
      
      <button id="btn-f3" class="ui-btn" title="Narrow Hair (F3)"></button>
      <button id="btn-f7" class="ui-btn" title="Toggle Panel"></button>
      <button id="btn-f8" class="ui-btn" title="Widen Hair (F8)"></button>
      <!-- <div id="hint">Use arrow keys to pan AOI</div> -->
    </div>
  </div>

  <script>
    (function () {
      const placeholder = document.getElementById('placeholder');
      const aoi = document.getElementById('aoi');
      const stage = document.getElementById('stage');

      const STEP = 2;       // pixels moved per key press
      const SCALE = 1.25;   // AOI enlargement

      let x = 0, y = 0;     // current translation (<= 0)
      let minX = 0, minY = 0; // most-negative translation allowed

      function computeBounds() {
        const vw = placeholder.clientWidth;
        const vh = placeholder.clientHeight;
        const iw = aoi.naturalWidth * SCALE;
        const ih = aoi.naturalHeight * SCALE;
        // If the image is larger than the viewport we can pan; otherwise no room.
        minX = Math.min(0, vw - iw);
        minY = Math.min(0, vh - ih);
      }

      function clamp() {
        if (x > 0) x = 0;
        if (y > 0) y = 0;
        if (x < minX) x = minX;
        if (y < minY) y = minY;
      }

      function apply() {
        clamp();
        aoi.style.transform = 'translate(' + x + 'px,' + y + 'px)';
      }

      const keys = {
        ArrowUp: () => { y += STEP; },   // reveal content below -> image moves down toward 0
        ArrowDown: () => { y -= STEP; },   // reveal content above
        ArrowLeft: () => { x += STEP; },
        ArrowRight: () => { x -= STEP; },
      };

      // Hair offset logic
      let hairOffset = 46;
      const rootStyle = document.documentElement.style;
      const btnF3 = document.getElementById('btn-f3');
      const btnF7 = document.getElementById('btn-f7');
      const btnF8 = document.getElementById('btn-f8');

      function updateHairOffset() {
        rootStyle.setProperty('--hair-offset', hairOffset + 'px');
      }

      function narrowHair() {
        if (stage.classList.contains('panel-adjusted')) return; // only in default mode
        if (hairOffset > 0) {
          hairOffset = Math.max(0, hairOffset - 2);
          updateHairOffset();
        }
      }

      function widenHair() {
        if (stage.classList.contains('panel-adjusted')) return; // only in default mode
        if (hairOffset < 240) {
          hairOffset += 2;
          updateHairOffset();
        }
      }
      
      function toggleAdjustPanel() {
        stage.classList.toggle('panel-adjusted');
      }

      function simulateButtonPress(btn) {
        btn.classList.add('active');
        setTimeout(() => btn.classList.remove('active'), 150);
      }

      btnF3.addEventListener('click', narrowHair);
      btnF7.addEventListener('click', toggleAdjustPanel);
      btnF8.addEventListener('click', widenHair);

      window.addEventListener('keydown', function (e) {
        if (e.key === 'F3') {
          e.preventDefault();
          narrowHair();
          simulateButtonPress(btnF3);
          return;
        }
        if (e.key === 'F8') {
          e.preventDefault();
          widenHair();
          simulateButtonPress(btnF8);
          return;
        }
        const fn = keys[e.key];
        if (!fn) return;
        e.preventDefault();
        fn();
        apply();
      });

      // Scale the 1024x768 stage to fill the viewport, preserving aspect ratio.
      function fit() {
        const s = Math.min(window.innerWidth / 1024, window.innerHeight / 768);
        stage.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);

      function init() {
        computeBounds();
        // Start with the AOI centered inside the placeholder.
        const iw = aoi.naturalWidth * SCALE;
        const ih = aoi.naturalHeight * SCALE;
        x = (placeholder.clientWidth - iw) / 2;
        y = (placeholder.clientHeight - ih) / 2;
        apply();
        fit();
      }

      if (aoi.complete && aoi.naturalWidth) {
        init();
      } else {
        aoi.addEventListener('load', init);
      }
      stage.focus();
    })();
  </script>
</body>

</html>
